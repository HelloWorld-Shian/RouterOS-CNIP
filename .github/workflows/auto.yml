on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成最新IP规则文件
        run: python app/scripts/github.py

      - name: 自动提交更新到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/*
          git commit -m "更新IP地址库" || exit 0
          git push